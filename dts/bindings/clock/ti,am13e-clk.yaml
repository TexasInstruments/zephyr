description: TI AM13E clock node

compatible: "ti,am13e-clk"

include: [clock-controller.yaml, base.yaml]

properties:
  "#clock-cells":
    const: 1

  clocks:
    description: Parent clock source reference

  clock-frequency:
    type: int
    description: Output clock frequency in Hz

  ti,sysctl-base:
    type: int
    description: |
      SYSCTL Registers base.

clock-cells:
  - clk
