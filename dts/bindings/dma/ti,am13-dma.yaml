description: |
  TI AM13x DMA Controller

compatible: "ti,am13-dma"

include: dma-controller.yaml

properties:
  reg:
    required: true

  interrupts:
    required: true

  dma-channels:
    required: true

  "#dma-cells":
    const: 1
    description: No specific input is needed from dts to use eDMA
