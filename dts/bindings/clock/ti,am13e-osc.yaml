description: TI AM13E oscillator (XTAL or internal)

compatible: "ti,am13e-osc"

include: [fixed-clock.yaml, base.yaml]

properties:
  "#clock-cells":
    const: 0

  ti,xtal-startup-delay:
    type: int
    description: |
      Crystal oscillator startup time, stored in units of 64 us
      (value = delay_us / 64). Applies only to the HFXT (external
      crystal) oscillator.
