CONFIG_SPI=y
CONFIG_SPI_ASYNC=y
CONFIG_SPI_DMA=y

# Enable logging with timestamps for better debugging
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y  # Immediate logging (no buffering)
CONFIG_LOG_TIMESTAMP_64BIT=y # 64-bit timestamps for accurate timing

# Console configuration
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y
